<!doctype html>
<html class="no-js" lang="en">

<head>
    <meta charset="utf-8">
    <title>Upload Gambar - TraveLand Template</title>
    <meta name="description" content="Upload image for fire detection model.">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="shortcut icon" href="{{ url_for('static', filename='assets/images/favicon.png') }}" type="image/png">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/animate.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/nice-select.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/LineIcons.2.0.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/bootstrap.4.5.2.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/default.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/style.css') }}">
</head>

<body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0;">

<!-- LOADING OVERLAY -->
<div id="loading" style="
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.75);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    flex-direction: column;
">
    <div style="
        width: 50px;
        height: 50px;
        border: 5px solid #eee;
        border-top: 5px solid #ff3d3d;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    "></div>
    <p style="margin-top:10px; font-weight:bold; color:#ff3d3d;">
        Mendeteksi gambar...
    </p>
</div>

<style>
@keyframes spin {
    100% { transform: rotate(360deg); }
}
</style>

<!-- HEADER -->
<section class="header_area">
    <div class="header_navbar">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">

                    <nav class="navbar navbar-expand-lg">
                        <a class="navbar-brand" href="index.html">
                            <img src="{{ url_for('static', filename='assets/images/logofire1.png') }}"
                                 style="width:50%; height:auto;">
                        </a>

                        <div class="collapse navbar-collapse sub-menu-bar" id="navbarSupportedContent">
                            <ul id="nav" class="navbar-nav ml-auto">
                                <li class="nav-item">
                                    <a class="page-scroll" href="/">Home</a>
                                </li>
                                <li class="nav-item active">
                                    <a class="page-scroll" href="#" style="white-space:nowrap;">Life Detection</a>
                                </li>
                            </ul>
                        </div>
                    </nav>

                </div>
            </div>
        </div>
    </div>

    <!-- HERO -->
    <div id="home" class="header_slider">
        <div class="single_slider bg_cover d-flex align-items-center"
            style="background-image: url(static/assets/images/bg_kebakaran1.jpg)">

            <div class="container">
                <div class="row">
                    <div class="col-lg-6 col-md-8">

                        <div class="slider_content">

                            <h2 class="slider_title wow fadeInLeftBig">
                                Deteksi Kebakaran <span>dan Asap Hutan</span>
                            </h2>

                            <div style="width:100%; max-width:450px; padding:40px 30px; border-radius:15px;
                                background:#fff; box-shadow:0 15px 40px rgba(0,0,0,0.1); text-align:center;">

                                <p style="font-size:14px; color:#666; margin-bottom:20px;">
                                    Select an image to run fire detection.
                                </p>

                                <form id="upload-form" enctype="multipart/form-data">

                                    <div id="drop-zone" style="
                                        position: relative;
                                        padding: 25px 15px;
                                        border: 2px dashed #ced4da;
                                        border-radius: 10px;
                                        cursor: pointer;
                                        background:#fafafa;
                                        margin-bottom:20px;
                                    ">
                                        <span id="file-label" style="font-size:14px; color:#495057;">
                                            Pilih atau seret gambar ke sini
                                        </span>

                                        <input type="file" name="image" id="image" accept="image/*"
                                            style="position:absolute; inset:0; opacity:0; cursor:pointer;">
                                    </div>

                                    <button type="submit" class="main-btn"
                                        style="width:100%; padding:12px; background:#ff3d3d; color:#fff;
                                        border:none; border-radius:10px;">
                                        Upload & Detect
                                    </button>

                                </form>

                                <div id="preview" style="margin-top:15px;"></div>

                            </div>

                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>
</section>

<!-- FOOTER (tidak diubah besar, tetap normal) -->
<section id="footer" class="footer_area">
    <div class="footer_widget pt-80 pb-130">
        <div class="container" style="max-width:900px; margin:0 auto;">

            <div class="row justify-content-center text-center">

                <div class="col-lg-5">
                    <img src="{{ url_for('static', filename='assets/images/logofire1.png') }}"
                         style="width:50%;">

                    <p>
                        Website ini dikembangkan sebagai tugas Computer Vision dan AI.
                    </p>
                </div>

                <div class="col-lg-5">
                    <h4>Quick Link</h4>
                    <ul>
                        <li><a href="#home">Home</a></li>
                        <li><a href="#about">About</a></li>
                        <li><a href="#packges">Detection</a></li>
                    </ul>
                </div>

            </div>

        </div>

        <p class="text-center mt-90">
            Website by Zidan Zaki
        </p>
    </div>
</section>

<!-- JS -->
<script src="{{ url_for('static', filename='assets/js/vendor/jquery-1.12.4.min.js') }}"></script>
<script src="{{ url_for('static', filename='assets/js/bootstrap.4.5.2.min.js') }}"></script>

<script>
const fileInput = document.getElementById('image');
const fileLabel = document.getElementById('file-label');
const previewDiv = document.getElementById('preview');
const uploadForm = document.getElementById('upload-form');
const loading = document.getElementById('loading');

// preview file
fileInput.addEventListener('change', function () {
    const file = this.files[0];
    if (file) {
        fileLabel.textContent = file.name;
    }
});

// submit
uploadForm.addEventListener('submit', function (e) {
    e.preventDefault();

    loading.style.display = 'flex';
    previewDiv.innerHTML = '';

    const formData = new FormData(this);

    fetch('/detect', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        loading.style.display = 'none';

        if (data.error) {
            previewDiv.innerHTML = `<p style="color:red;">${data.error}</p>`;
            return;
        }

        previewDiv.innerHTML = `
            <div style="background:#fff; padding:10px; border-radius:10px;">
                <img src="${data.image_url}" style="width:100%; border-radius:8px;">
                <div style="text-align:left; margin-top:10px; font-size:13px;">
                    <b>HASIL DETEKSI</b><br>
                    Objek: ${data.object_label}<br>
                    Luas: ${data.total_bbox_area}px²<br>
                    Persentase: ${data.percent}%<br>
                    Kategori: ${data.category}
                </div>
            </div>
        `;
    })
    .catch(err => {
        loading.style.display = 'none';
        previewDiv.innerHTML = `<p style="color:red;">Error sistem</p>`;
    });
});
</script>

</body>
</html>
